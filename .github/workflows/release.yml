name: release-fallbacks

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (compute version + notes, publish nothing)"
        type: boolean
        default: true

concurrency:
  group: release-fallbacks
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check package changes
        id: package_changes
        run: |
          latest_tag="$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || true)"
          if [ -z "$latest_tag" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "$latest_tag"..HEAD -- packages/fallbacks; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No packages/fallbacks changes since $latest_tag."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: oven-sh/setup-bun@v2
        if: steps.package_changes.outputs.changed == 'true'
        with:
          bun-version: 1.3.12
      - run: bun install --frozen-lockfile
        if: steps.package_changes.outputs.changed == 'true'
      - run: bun run build
        if: steps.package_changes.outputs.changed == 'true'
      - name: Clear Bun install tree before npm publish
        if: steps.package_changes.outputs.changed == 'true'
        run: rm -rf node_modules packages/*/node_modules
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          ANTHROPIC_API_KEY_RELEASE_NOTES: ${{ secrets.ANTHROPIC_API_KEY_RELEASE_NOTES }}
        if: steps.package_changes.outputs.changed == 'true'
        run: >
          npx --yes
          --package semantic-release@24
          --package @semantic-release/github@12.0.8
          --package semantic-release-ai-notes@0.3.0
          semantic-release ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && '--dry-run' || '' }}
